name: Cangjie Unit Test CI
on: [push] # 任何代码提交都会触发

jobs:
  test:
    runs-on: ubuntu-latest
    # 核心魔法在这里：直接指定使用社区打包好的仓颉 Docker 镜像
    container:
      image: zxilly/cangjie:latest 
      
    steps:
      - name: 检出代码 (Checkout)
        uses: actions/checkout@v4

      - name: 验证仓颉环境 (Check Environment)
        run: |
          echo "当前的仓颉编译器版本是："
          cjc --version
          
      - name: 运行自动化单元测试 (Run Tests)
        run: |
          echo "开始执行测试..."
          cjpm test
